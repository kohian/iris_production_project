name: Build and Test and Ruff then Push Docker Image

on: 
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker_lint_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # - name: Build Docker dev image
      #   run: |
      #     docker build -f Dockerfile_dev -t iris-dev .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile_dev
          tags: iris-dev:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run lint in docker container
        run: |
          docker run --rm iris-dev ruff check src tests

      - name: Run pytest on docker container
        run: |
          docker run --rm iris-dev


  docker_build_push:
    needs: docker_lint_test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # REQUIRED for WIF

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/429394297242/locations/global/workloadIdentityPools/github-actions/providers/github-google
          service_account: github-action-push-to-artifact@iris-ml-production.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: iris-ml-production

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # - name: Build Docker image
      #   run: |
      #     docker build -t us-central1-docker.pkg.dev/iris-ml-production/ian-docker-artifacts/iris-ml:${{ github.sha }} .

      # - name: Push Docker image
      #   run: |
      #     docker push us-central1-docker.pkg.dev/iris-ml-production/ian-docker-artifacts/iris-ml:${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile_train          
          push: true
          tags: |
            us-central1-docker.pkg.dev/iris-ml-production/ian-docker-artifacts/iris-ml:${{ github.sha }}
            us-central1-docker.pkg.dev/iris-ml-production/ian-docker-artifacts/iris-ml:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max