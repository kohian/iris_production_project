name: Build and Push Docker Image

on: 
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

jobs:
  docker_build_push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # REQUIRED for WIF

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/429394297242/locations/global/workloadIdentityPools/github-actions/providers/github-google
          service_account: github-action-push-to-artifact@iris-ml-production.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t us-central1-docker.pkg.dev/iris-ml-production/ian-docker-artifacts/iris-ml:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push us-central1-docker.pkg.dev/iris-ml-production/ian-docker-artifacts/iris-ml:${{ github.sha }}

